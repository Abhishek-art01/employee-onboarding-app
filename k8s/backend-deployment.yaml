apiVersion: v1
kind: Namespace
metadata:
  name: onboarding
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: onboarding
data:
  NODE_ENV      : "production"
  PORT          : "5000"
  DB_HOST       : "postgres"
  DB_PORT       : "5432"
  DB_NAME       : "onboarding_db"
  DB_USER       : "postgres"
  FRONTEND_URL  : "https://onboarding.yourcompany.com"
  AWS_REGION    : "ap-south-1"
  S3_BUCKET_NAME: "employee-onboarding-docs-prod"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: onboarding
type: Opaque
stringData:
  DB_PASSWORD          : "changeme_strong_password"
  JWT_SECRET           : "change_to_64_char_random_string_in_production_please"
  ENCRYPTION_KEY       : "0123456789abcdef0123456789abcdef"
  AWS_ACCESS_KEY_ID    : "your_aws_access_key"
  AWS_SECRET_ACCESS_KEY: "your_aws_secret_key"
  SMTP_USER            : "noreply@yourcompany.com"
  SMTP_PASS            : "smtp_password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: onboarding
  labels:
    app: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: backend
          image: your-registry/onboarding-backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
